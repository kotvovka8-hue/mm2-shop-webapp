<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MM2 Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div style="display: flex; gap: 8px; margin-bottom: 10px;">
            <input type="text" id="search" placeholder="🔍 Поиск..." autocomplete="off" style="flex:1;">
            <button id="refreshBtn" style="padding: 10px 16px; border-radius: 12px; border: none; background: #333; color: #fff; cursor:pointer;">🔄</button>
        </div>
        <div id="update-time" style="text-align: center; font-size: 14px; color: #ccc; background: #2a2a2a; border-radius: 8px; padding: 6px; margin-bottom: 10px;">
            🕒 Загрузка...
        </div>
        <div id="categories"></div>
        <div id="items"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
