<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MM2 Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Верхняя панель -->
        <div class="top-bar">
            <input type="text" id="search" placeholder="🔍 Поиск..." autocomplete="off">
            <button id="refreshBtn">🔄</button>
        </div>

        <!-- Фильтры -->
        <div class="filter-bar">
            <select id="sortPrice">
                <option value="none">Цена: без сортировки</option>
                <option value="asc">Цена: по возрастанию</option>
                <option value="desc">Цена: по убыванию</option>
            </select>
            <select id="filterRarity">
                <option value="all">Все редкости</option>
            </select>
            <button id="resetFiltersBtn">Сбросить</button>
        </div>

        <!-- Время обновления -->
        <div id="update-time">🕒 Загрузка...</div>

        <!-- Категории -->
        <div id="categories"></div>

        <!-- Список предметов -->
        <div id="items"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
